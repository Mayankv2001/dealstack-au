# Gift-card ingest trigger — every other day at 7:00 AM Australia/Sydney.
#
# GitHub cron runs in UTC and cannot express "7am Sydney" across daylight
# saving, so this fires DAILY at BOTH possible UTC equivalents (20:00 UTC
# during AEDT, 21:00 UTC during AEST) and lets the endpoint decide: it accepts
# an invocation only when it is currently the 7 o'clock hour in
# Australia/Sydney AND the last real run started ≥40 hours ago (the
# every-other-day guard), under a one-running DB lock. Off-hour and duplicate
# calls return a safe machine-readable skip, so this schedule is idempotent by
# construction.
#
# The endpoint is quadruple-gated (CRON_SECRET bearer, GCDB_INGEST_ENABLED env
# flag, gift_card_sources.enabled AND .automated_fetch_allowed) and ships OFF by
# design (source policy: adapters are enabled only after a recorded review).
#
# Exit contract (mirrors monitor-health.yml / gift-card-lifecycle.yml):
#   0 = ran cleanly, OR skipped by a KNOWN gate — including the deliberate-off
#       states (environment-disabled, source-missing/-disabled, fetch-not-
#       permitted, permission-review-incomplete, no-feed-url) and the cadence
#       gates (outside-run-hour, interval-guard, already-running). A disabled
#       ingest is the compliance-correct steady state, so it stays green, but
#       the reason is printed as a ::notice:: — never silently green.
#   1 = the endpoint failed (non-2xx incl. 401/500/503 schema-unavailable), the
#       run reported errors (ok:false / status partial|error / errorCount>0), it
#       skipped for a reason this workflow does not recognise, or the body was
#       unreadable.
#   2 = blind: the CRON_SECRET repository secret is missing.
# Only HTTP status + machine-readable summary keys are logged (public repo).
#
# Human setup (once): the CRON_SECRET repository Actions secret (shared with
# monitor-health.yml) must exist; enablement of the ingest itself happens in
# Vercel env + the DB source row, never here.

name: Gift-card ingest (7am Sydney, every other day)

on:
  schedule:
    - cron: "0 20 * * *" # 7:00 AEDT (UTC+11)
    - cron: "0 21 * * *" # 7:00 AEST (UTC+10)
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: gift-card-ingest
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call the ingest endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET repository secret is missing — this trigger is blind."
            exit 2
          fi
          status=$(curl -sS -o response.json -w "%{http_code}" \
            --max-time 300 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://dealstack-au.vercel.app/api/cron/gift-card-ingest")
          echo "HTTP $status"
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "::error::gift-card ingest endpoint returned HTTP $status"
            exit 1
          fi
          python3 - <<'PY'
          import json, sys

          # KNOWN skips that stay green. Deliberate-off states + cadence gates.
          # schema-unavailable is deliberately NOT here — it returns 503 (caught
          # above as non-2xx) and means the job-run tables are missing.
          BENIGN_SKIPS = {
              "environment-disabled", "source-missing", "source-disabled",
              "fetch-not-permitted", "permission-review-incomplete", "no-feed-url",
              "outside-run-hour", "interval-guard", "already-running",
          }
          KEYS = ["ok", "ran", "skipped", "status", "itemsSeen", "itemsNew",
                  "newCandidates", "changedCandidates", "errorCount", "durationMs"]

          try:
              with open("response.json") as f:
                  data = json.load(f)
          except (OSError, ValueError) as exc:
              print(f"::error::gift-card ingest returned an unreadable body: {exc}")
              sys.exit(1)

          print({k: data.get(k) for k in KEYS if k in data})

          skipped = data.get("skipped")
          if skipped:
              if skipped in BENIGN_SKIPS:
                  print(f"::notice::gift-card ingest skipped by a known gate ({skipped}) — no work this run.")
                  sys.exit(0)
              print(f"::error::gift-card ingest skipped for an unrecognised reason: {skipped}")
              sys.exit(1)

          if data.get("ok") is False or (data.get("errorCount") or 0) or data.get("status") in ("partial", "error"):
              print(f"::error::gift-card ingest completed with errors (status={data.get('status')}, errorCount={data.get('errorCount')}).")
              sys.exit(1)

          print(f"::notice::gift-card ingest ran: itemsSeen={data.get('itemsSeen')} newCandidates={data.get('newCandidates')} changedCandidates={data.get('changedCandidates')}.")
          PY
