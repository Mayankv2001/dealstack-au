name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test:monitor
      - run: npm run test:stack
      - run: npm run test:admin
      - run: npm run test:giftcards
      - run: npm run test:deals
      - run: npm run build
      - name: Smoke test the production build
        run: |
          npm run start &
          for i in $(seq 1 30); do
            curl -sf -o /dev/null http://localhost:3000 && break
            sleep 2
          done
          npm run smoke
      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium
      - name: Browser smoke tests (static-fallback data)
        # No Supabase env in CI, so pages serve deterministic static data.
        # Reuses the build from the step above; Playwright starts its own
        # `next start` on a dedicated port (playwright.config.ts).
        run: npm run test:e2e
